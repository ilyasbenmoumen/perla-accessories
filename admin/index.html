<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Afrae Décor</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h1>Afrae Décor</h1>
      <p>Panneau d'administration</p>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label for="admin-password">Mot de passe</label>
        <input type="password" id="admin-password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:4px">
        Se connecter
      </button>
    </form>
  </div>
</div>

<!-- ADMIN APP -->
<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h2>Afrae Décor</h2>
      <p>Administration</p>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Principal</div>
        <div class="nav-item active" data-tab="dashboard" onclick="setTab('dashboard')">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Tableau de bord
        </div>
        <div class="nav-item" data-tab="orders" onclick="setTab('orders')">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Commandes
        </div>
        <div class="nav-item" data-tab="products" onclick="setTab('products')">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
          Produits
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Site</div>
        <div class="nav-item" onclick="window.open('/', '_blank')" style="cursor:pointer">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
          Voir le site
        </div>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="nav-item" onclick="logout()" style="color:#ff6b6b">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Déconnexion
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="page-title">Tableau de bord</div>
      <div class="topbar-user">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Administrateur
      </div>
    </div>
    <div class="content">
      <div id="tab-content"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script src="/admin/admin.js"></script>
</body>
</html>
